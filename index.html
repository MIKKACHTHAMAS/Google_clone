<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Google</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header>
    <nav aria-label="Google services">
      <ul class="header-nav">
        <li><a href="https://mail.google.com" target="_blank" rel="noopener">Gmail</a></li>
        <li><a href="https://images.google.com" target="_blank" rel="noopener">Images</a></li>
        <li>
          <button class="apps-launcher" aria-label="Google apps">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="#5f6368" aria-hidden="true">
              <path d="M6,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM6,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM12,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM16,6c0,1.1 0.9,2 2,2s2,-0.9 2,-2 -0.9,-2 -2,-2 -2,0.9 -2,2zM12,8c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,14c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2zM18,20c1.1,0 2,-0.9 2,-2s-0.9,-2 -2,-2 -2,0.9 -2,2 0.9,2 2,2z"/>
            </svg>
          </button>
        </li>
        <li>
          <button class="user-avatar" aria-label="Google Account">
            <span>J</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <div class="container">
      <div class="logo-wrapper">
        <img src="assets/Google_2015_logo.svg" alt="Google" width="272" height="92">
      </div>

      <form class="search-form" role="search" action="/search" method="get">
        <div class="search-bar">
          <span class="search-icon" aria-hidden="true">
            <svg focusable="false" viewBox="0 0 24 24" width="20" height="20" fill="#9aa0a6">
              <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </span>
          <input type="text" class="search-input" name="q" aria-label="Search Google" autocomplete="off" title="Search">
          <span class="action-icons">
            <span class="mic-icon" aria-label="Search by voice" role="button" tabindex="0">
              <svg focusable="false" viewBox="0 0 24 24" width="24" height="24" fill="#4285f4">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
              </svg>
            </span>
            <span class="lens-icon" aria-label="Search by image" role="button" tabindex="0">
              <svg focusable="false" viewBox="0 0 24 24" width="24" height="24" fill="#4285f4">
                <path d="M18.9 13.2l-4.3-4.3c.9-1.4 1.4-3 1.4-4.9C16 2.4 13.6 0 10.5 0S5 2.4 5 5.5 7.4 11 10.5 11c1.6 0 3.1-.5 4.3-1.3l4.4 4.3c.4.4 1 .4 1.4 0l.8-.8c.4-.4.4-1 0-1.4l-2.5-2.6zM10.5 8C8 8 6 6 6 3.5S8 0 10.5 0 15 1 15 3.5 13 8 10.5 8z"/>
                <path d="M20.5 21c-.3 0-.5-.1-.7-.3l-4.1-4.1c-.4-.4-.4-1 0-1.4l.7-.7c.4-.4 1-.4 1.4 0l4.1 4.1c.4.4.4 1 0 1.4l-.7.7c-.2.2-.4.3-.7.3z"/>
              </svg>
            </span>
          </span>
        </div>
        <div class="search-buttons">
          <button type="submit" class="btn">Google Search</button>
          <button type="submit" name="btnI" class="btn">I'm Feeling Lucky</button>
        </div>
      </form>

      <div class="language-section">
        <span>Google offered in: </span>
        <a href="#" hreflang="ta">தமிழ்</a>
        <a href="#" hreflang="hi">हिन्दी</a>
        <a href="#" hreflang="te">తెలుగు</a>
        <a href="#" hreflang="ml">മലയാളം</a>
        <a href="#" hreflang="kn">ಕನ್ನಡ</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-country">
      <span>India</span>
    </div>
    <div class="footer-links">
      <div class="footer-left">
        <a href="https://about.google/" target="_blank" rel="noopener">About</a>
        <a href="https://ads.google.com/" target="_blank" rel="noopener">Advertising</a>
        <a href="https://www.google.com/business/" target="_blank" rel="noopener">Business</a>
        <a href="https://www.google.com/search/howsearchworks/" target="_blank" rel="noopener">How Search works</a>
      </div>
      <div class="footer-right">
        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy</a>
        <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms</a>
        <button class="settings-button" aria-label="Search settings">Settings</button>
      </div>
    </div>
  </footer>
</body>
</html>
